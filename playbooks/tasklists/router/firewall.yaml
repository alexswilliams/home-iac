- name: NFTables (Pre-Network) Config
  ansible.builtin.copy:
    dest: /etc/nftables-pre-up.conf
    src: files/router/nftables/nftables-pre-up.nft
    group: root
    owner: root
    mode: "0600"
  register: nftables_pre_up_config

- name: NetFilter Tables Config
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    src: files/router/nftables/nftables-post-up.nft
    group: root
    owner: root
    mode: "0600"
  register: nftables_config

- name: NFTables config is applied when changes made
  ansible.builtin.command:
    cmd: /usr/sbin/nft -o -f /etc/nftables.conf
  changed_when: true
  when: nftables_config.changed

- name: Built-in NetFilter service is disabled
  ansible.builtin.service:
    name: nftables.service
    enabled: false

- name: NFTables (Pre-Network) custom systemd unit
  ansible.builtin.copy:
    src: files/router/nftables/nftables-pre-up.service
    dest: /lib/systemd/system/nftables-pre-up.service
    group: root
    owner: root
    mode: "0644"
  register: nft_pre_systemd_unit

- name: NFTables (Post-Network) custom systemd unit
  ansible.builtin.copy:
    src: files/router/nftables/nftables-post-up.service
    dest: /lib/systemd/system/nftables-post-up.service
    group: root
    owner: root
    mode: "0644"
  register: nft_post_systemd_unit

- name: Reload systemd on changes
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: nft_pre_systemd_unit.changed or nft_post_systemd_unit.changed

- name: NFTables custom units enabled on boot
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
  with_items:
    - nftables-pre-up.service
    - nftables-post-up.service
