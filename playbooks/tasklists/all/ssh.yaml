- name: SSHD is installed
  ansible.builtin.package:
    state: present
    name:
      - "{{ item }}"
  with_items:
    - "{{ sshd_package[ansible_facts['os_family']] }}"
  when: sshd_package[ansible_facts['os_family']] is defined
  vars:
    sshd_package:
      Debian: ssh
      RedHat: openssh-server
      Archlinux: openssh

- name: SSH is installed
  ansible.builtin.package:
    state: present
    name:
      - "{{ item }}"
  with_items:
    - "{{ ssh_package[ansible_facts['os_family']] }}"
  when: ssh_package[ansible_facts['os_family']] is defined
  vars:
    ssh_package:
      Debian: openssh-client
      RedHat: openssh-clients
      Archlinux: ssh

- name: SSH genkeys service is disabled
  ansible.builtin.systemd_service:
    name: sshdgenkeys.service
    state: stopped
    enabled: false
    masked: true
  register: result_systemd_stop
  failed_when: "result_systemd_stop is failed and 'Could not find the requested service' not in result_systemd_stop.msg"

- name: ED25519 host key exists
  ansible.builtin.command:
    cmd: ssh-keygen -q -t ed25519 -b 521 -f /etc/ssh/ssh_host_ed25519_key -C "" -N ""
    creates: /etc/ssh/ssh_host_ed25519_key
  register: new_host_key_task

- name: Dispay new ED25519 host key
  ansible.builtin.command:
    cmd: cat /etc/ssh/ssh_host_ed25519_key.pub
  when: new_host_key_task.changed

- name: Controller's known_hosts file contains new host key
  become: false
  delegate_to: localhost
  ansible.builtin.known_hosts:
    path: "~/.ssh/known_hosts"
    state: present
    name: "{{ inventory_hostname }}"
    key: "{{ inventory_hostname }} {{ new_host_key_task.stdout_lines[0] }}"
    hash_host: true
  when: new_host_key_task.changed

- name: Remove sshd_config.d directory
  ansible.builtin.file:
    state: absent
    path: /etc/ssh/sshd_config.d

- name: SSH Daemon is configured
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config
    group: root
    owner: root
    mode: "0644"
    content: |
      Port 22
      ListenAddress [::]:22
      ListenAddress 0.0.0.0:22
      HostKey /etc/ssh/ssh_host_ed25519_key
      HostKeyAlgorithms ssh-ed25519-cert-v01@openssh.com,ssh-ed25519
      KExAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,mlkem768x25519-sha256
      Ciphers chacha20-poly1305@openssh.com
      Macs umac-128-etm@openssh.com

      AllowUsers {{ ansible_user }}
      AuthenticationMethods publickey
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys

      LoginGraceTime 10
      MaxAuthTries 2
      StrictModes yes
      PermitRootLogin no
      UsePAM yes
      ChallengeResponseAuthentication no
      PasswordAuthentication no
      HostbasedAuthentication no
      KerberosAuthentication no
      GSSAPIAuthentication no

      AllowTcpForwarding yes
      AllowAgentForwarding yes
      PermitTunnel no
      PermitTTY yes
      TcpKeepAlive yes

      PrintMotd no
      PrintLastLog no
      Banner none

      Subsystem       sftp    {{ sftp_path[ansible_facts['os_family']] }}
    validate: "/usr/sbin/sshd -f %s -t"
  register: sshd_config_task
  vars:
    sftp_path:
      RedHat: /usr/libexec/openssh/sftp-server
      Debian: /usr/lib/openssh/sftp-server

- name: No unnecessary host keys exist
  ansible.builtin.file:
    state: absent
    path: "{{ item }}"
  with_items:
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_dsa_key.pub
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_rsa_key.pub
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub

- name: No DH moduli exist
  ansible.builtin.file:
    state: absent
    path: /etc/ssh/moduli

- name: Password logins disabled in PAM for SSH
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    state: absent
    insertbefore: BOF
    regex: 'auth[ \t]+include[ \t]+system-remote-login'

- name: Root logins disallowed in PAM for SSH
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    state: present
    insertbefore: BOF
    regex: 'auth[ \t]+required[ \t]+pam_securetty.so'
    line: "auth required pam_securetty.so"

- name: SSH Daemon restarted when changes made
  ansible.builtin.service:
    name: sshd
    state: restarted
    enabled: true
  when: sshd_config_task.changed or new_host_key_task.changed
