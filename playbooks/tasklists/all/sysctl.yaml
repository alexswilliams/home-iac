- name: Non-specific ICMP echos are ignored
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
  with_items:
    - net.ipv4.icmp_echo_ignore_broadcasts
    - net.ipv6.icmp.echo_ignore_anycast
    - net.ipv6.icmp.echo_ignore_multicast

- name: ICMP redirects are not accepted
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "0"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.accept_redirects
    - net.ipv4.conf.default.accept_redirects
    - net.ipv6.conf.all.accept_redirects
    - net.ipv6.conf.default.accept_redirects

- name: ICMP redirects are not sent
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "0"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.send_redirects
    - net.ipv4.conf.default.send_redirects

- name: Source routes are not accepted
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "0"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.accept_source_route
    - net.ipv4.conf.default.accept_source_route
    - net.ipv6.conf.all.accept_source_route
    - net.ipv6.conf.default.accept_source_route

- name: TCP SYN cookies are enabled
  ansible.posix.sysctl:
    state: present
    name: net.ipv4.tcp_syncookies
    value: "1"
    sysctl_set: true

- name: Reverse-path filtering is enabled
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.rp_filter
    - net.ipv4.conf.default.rp_filter

- name: Packets with impossible addresses are dropped
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.log_martians
    - net.ipv4.conf.default.log_martians

- name: IPv6 Forwarding is configured
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "{{ ipv6_forwarding }}"
    sysctl_set: true
  with_items:
    - net.ipv6.conf.all.forwarding
    - net.ipv6.conf.default.forwarding

- name: IPv4 Forwarding is configured
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "{{ ipv4_forwarding }}"
    sysctl_set: true
  with_items:
    - net.ipv4.conf.all.forwarding
    - net.ipv4.conf.default.forwarding
    - net.ipv4.ip_forward

- name: IPv4 NetFilter conntrack accounting is set
  ansible.posix.sysctl:
    state: present
    name: "{{ item }}"
    value: "{{ ipv4_forwarding }}"
    sysctl_set: true
  with_items:
    - net.netfilter.nf_conntrack_acct
  when: ipv4_forwarding == "1" or ipv6_forwarding == "1"

- name: Extra sysctl rules file added for forwarding
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-ip-forward.conf
    group: root
    owner: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward={{ ipv4_forwarding }}

- name: Sysctl Service is enabled on boot
  ansible.builtin.service:
    name: systemd-sysctl.service
    enabled: true
