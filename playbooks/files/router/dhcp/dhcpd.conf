# dhcpd.conf

default-lease-time 600;
max-lease-time 7200;

ddns-update-style none;

authoritative;


subnet 192.168.0.0 netmask 255.255.255.0 {
	interface "eth0.t10-mgmt";
	option domain-name "management.local";
	option domain-search "management.local";
	option domain-name-servers 192.168.0.2, 1.1.1.1;
	# a fake router so that the netgear switches don't try dialing out
	option routers 192.168.0.254;
	option subnet-mask 255.255.255.0;
	deny client-updates;
	deny unknown-clients;

	use-host-decl-names on;
}

host router { hardware ethernet 2c:cf:67:5a:74:6a; fixed-address 192.168.0.2, 192.168.1.2, 192.168.2.2, 192.168.3.2, 192.168.4.2, 192.168.5.2, 192.168.6.2, 192.168.100.2; }
host top-switch-gs308e { hardware ethernet 28:94:01:7b:61:f8; fixed-address 192.168.0.10; }
host work-desk-switch-gs305e { hardware ethernet 54:07:7d:2a:17:33; fixed-address 192.168.0.11; }
host media-switch-gs108ev2 { hardware ethernet 28:c6:8e:fb:36:cd; fixed-address 192.168.0.12; }
host access-point-902 { hardware ethernet 00:1d:aa:3d:4f:86; fixed-address 192.168.0.20; }
# host netgear-default-addr { hardware ethernet xx:xx:xx:xx:xx:xx; fixed-address 192.168.0.239; }
# host dummy-gateway { hardware ethernet xx:xx:xx:xx:xx:xx; fixed-address 192.168.0.254; }


subnet 192.168.1.0 netmask 255.255.255.0 {
	interface "eth0";
}
# host ext-router { hardware ethernet ; fixed-address 192.168.1.1; }
# host router { hardware ethernet 2c:cf:67:5a:74:6a; fixed-address 192.168.1.2; }

subnet 192.168.2.0 netmask 255.255.255.0 {
	interface "eth0.t12-main";
	option domain-name "main.local";
	option domain-search "main.local", "management.local", "work.local", "media.local", "iot.local", "monitoring.local", "guest.local";
	option domain-name-servers 192.168.2.2, 1.1.1.1;
	option routers 192.168.2.2;
	option subnet-mask 255.255.255.0;
	deny client-updates;
	deny unknown-clients;

	use-host-decl-names on;
}
