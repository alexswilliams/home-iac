- name: Update All
  hosts: localhost
  become: true
  tasks:
    - name: Update all packages (DNF)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
        update_only: true
      when: ansible_facts['os_family'] == 'RedHat'
    - name: Autoremove packages (DNF)
      ansible.builtin.dnf:
        autoremove: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Update all packages (APT)
      ansible.builtin.apt:
        name: "*"
        state: latest
        update_cache: true
        only_upgrade: true
      when: ansible_facts['os_family'] == 'Debian'
    - name: Autoremove packages (APT)
      ansible.builtin.apt:
        autoremove: true
      when: ansible_facts['os_family'] == 'Debian'
